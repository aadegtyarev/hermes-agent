# Avahi in the agent container — RESOLVE/BROWSE only, never publish.
#
# disable-publishing=yes is the whole point: the container shares the host's
# network (network_mode: host), so a second *publishing* avahi would fight the
# host's avahi over the host name on 224.0.0.251:5353. With publishing off we
# only send queries and read answers, so `.local` resolution (via libnss-mdns)
# and avahi-browse work while coexisting cleanly with the host daemon.
[server]
use-ipv4=yes
use-ipv6=yes
enable-dbus=yes
ratelimit-interval-usec=1000000
ratelimit-burst=1000

[wide-area]
enable-wide-area=yes

[publish]
disable-publishing=yes
disable-user-service-publishing=yes

[reflector]

[rlimits]
